<div class="import-backdrop ask-history-backdrop" id="ask-history-backdrop" hidden>
  <aside class="import-modal ask-history-drawer" role="dialog" aria-modal="true" aria-labelledby="ask-history-title">
    <div class="import-head"><span id="ask-history-title">{{ t('Ask history') }}</span><button class="import-close" id="ask-history-close" type="button" aria-label="{{ t('Close') }}"><span class="nav-icon" style="--nav-icon:url('/static/lucide/x.svg')"></span></button></div>
    <div class="import-body ask-history-body">
      <div class="ask-history-tools">
        <form class="ask-history-search" id="ask-history-search-form">
          <input class="search-input" id="ask-history-search" type="search" placeholder="{{ t('Search conversations…') }}" autocomplete="off">
          <button class="btn sec" type="submit" aria-label="{{ t('Search') }}"><span class="nav-icon" style="--nav-icon:url('/static/lucide/search.svg')"></span></button>
        </form>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px"><span class="sub" id="ask-history-count" role="status" aria-live="polite" style="font-size:11px"></span><a class="btn sec" id="ask-history-new" href="{{ ask_history_open_url }}" style="padding:6px 9px"><span class="nav-icon" style="--nav-icon:url('/static/lucide/plus.svg')"></span>{{ t('New conversation') }}</a></div>
      </div>
      <div class="ask-history-list" id="ask-history-list" aria-live="polite"></div>
      <div class="ask-history-footer">
        <button class="btn sec" id="ask-history-previous" type="button" style="padding:6px 9px">{{ t('Previous') }}</button>
        <span class="sub" id="ask-history-page" style="font-size:11px"></span>
        <button class="btn sec" id="ask-history-next" type="button" style="padding:6px 9px">{{ t('Next') }}</button>
      </div>
    </div>
  </aside>
</div>
<script>
(()=>{
  const tr=window.localplaudT,backdrop=document.getElementById('ask-history-backdrop'),closeButton=document.getElementById('ask-history-close'),searchForm=document.getElementById('ask-history-search-form'),searchInput=document.getElementById('ask-history-search'),list=document.getElementById('ask-history-list'),count=document.getElementById('ask-history-count'),pageLabel=document.getElementById('ask-history-page'),previous=document.getElementById('ask-history-previous'),next=document.getElementById('ask-history-next'),appView=document.getElementById('app-view');
  const fileId={{ ask_history_file_id|tojson }},selectedId={{ ask_history_selected_id|tojson }},openUrl={{ ask_history_open_url|tojson }};
  const cleanupController=new AbortController();let opener=null,inertState=new Map(),requestController=null,currentPage=1,totalPages=1;
  appView?.addEventListener('htmx:beforeCleanupElement',event=>{if(event.target===appView)cleanupController.abort();});
  const focusables=()=>[...backdrop.querySelectorAll('button:not([disabled]),a[href],input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex="-1"])')].filter(item=>!item.closest('[hidden]'));
  const regions=()=>[...document.querySelectorAll('.product-rail,.sidebar,.mobile-bar,.library-page,.shell')];
  function closeHistory({restoreFocus=true}={}){if(backdrop.hidden)return;backdrop.hidden=true;inertState.forEach((wasInert,region)=>{region.inert=wasInert;});inertState.clear();document.body.classList.remove('dialog-open');if(restoreFocus)opener?.focus();opener=null;requestController?.abort();}
  async function openHistory(button){if(!backdrop.hidden)return;opener=button;inertState=new Map(regions().map(region=>[region,region.inert]));inertState.forEach((_wasInert,region)=>{region.inert=true;});backdrop.hidden=false;document.body.classList.add('dialog-open');requestAnimationFrame(()=>searchInput.focus());await loadHistory(1);}
  function apiUrl(page){const url=new URL('/api/ask/threads',location.origin);if(fileId!==null)url.searchParams.set('file_id',fileId);if(searchInput.value.trim())url.searchParams.set('q',searchInput.value.trim());url.searchParams.set('page',String(page));return url;}
  function manageUrl(threadId){const url=new URL(`/api/ask/threads/${encodeURIComponent(threadId)}`,location.origin);if(fileId!==null)url.searchParams.set('file_id',fileId);return url;}
  function threadUrl(threadId){const url=new URL(openUrl,location.href);url.searchParams.set('ask_thread',threadId);return `${url.pathname}${url.search}${url.hash}`;}
  function iconButton(icon,label){const button=document.createElement('button'),glyph=document.createElement('span');button.type='button';button.className='ask-history-action';button.setAttribute('aria-label',label);button.title=label;glyph.className='nav-icon';glyph.style.setProperty('--nav-icon',`url('/static/lucide/${icon}.svg')`);button.append(glyph);return button;}
  function formatDate(value){try{return new Intl.DateTimeFormat(document.documentElement.lang||'en',{dateStyle:'medium',timeStyle:'short'}).format(new Date(value));}catch(_error){return value||'';}}
  function metaText(item){const values=[formatDate(item.updated_at),`${item.question_count} ${tr(item.question_count===1?'question':'questions')}`];if(item.saved_note_count)values.push(`${item.saved_note_count} ${tr(item.saved_note_count===1?'saved note':'saved notes')}`);return values;}
  function showRename(row,item,titleLink,trigger){const form=document.createElement('form'),input=document.createElement('input'),save=iconButton('check',tr('Save')),cancel=iconButton('x',tr('Cancel')),actions=row.querySelector('.ask-history-actions');form.className='ask-history-rename';input.className='search-input';input.maxLength=200;input.required=true;input.value=item.title;form.append(input,save,cancel);row.append(form);titleLink.hidden=true;actions.hidden=true;input.focus();input.select();cancel.addEventListener('click',()=>{form.remove();titleLink.hidden=false;actions.hidden=false;trigger.focus();});form.addEventListener('submit',async event=>{event.preventDefault();save.disabled=true;try{const response=await fetch(manageUrl(item.thread_id),{method:'PATCH',headers:{'content-type':'application/json'},body:JSON.stringify({title:input.value}),signal:cleanupController.signal});if(!response.ok)throw new Error();await loadHistory(1);[...list.querySelectorAll('.ask-history-row')].find(candidate=>candidate.dataset.threadId===item.thread_id)?.querySelector('.ask-history-action')?.focus();}catch(error){if(error.name!=='AbortError'){save.disabled=false;count.textContent=tr('Could not rename conversation');}};});}
  async function deleteThread(item,button){const noteMessage=item.saved_note_count?tr('Saved notes will remain.'):'';if(!confirm(`${tr('Delete this conversation?')} ${noteMessage}`.trim()))return;button.disabled=true;try{const response=await fetch(manageUrl(item.thread_id),{method:'DELETE',signal:cleanupController.signal});if(!response.ok)throw new Error();if(item.thread_id===selectedId){location.href=openUrl;return;}await loadHistory(Math.min(currentPage,totalPages));}catch(error){if(error.name!=='AbortError'){button.disabled=false;count.textContent=tr('Could not delete conversation');}}}
  function renderHistory(data){list.replaceChildren();count.textContent=`${data.total} ${tr(data.total===1?'conversation':'conversations')}`;currentPage=data.page;totalPages=data.pages;pageLabel.textContent=`${tr('Page')} ${data.page} / ${data.pages}`;previous.disabled=data.page<=1;next.disabled=data.page>=data.pages;if(!data.threads.length){const empty=document.createElement('div');empty.className='empty';empty.textContent=tr(searchInput.value.trim()?'No conversations match this search.':'No conversations yet.');list.append(empty);return;}for(const item of data.threads){const row=document.createElement('article'),main=document.createElement('div'),title=document.createElement('a'),preview=document.createElement('div'),meta=document.createElement('div'),actions=document.createElement('div'),rename=iconButton('pencil',tr('Rename')),remove=iconButton('trash-2',tr('Delete'));row.className=`ask-history-row${item.thread_id===selectedId?' current':''}`;row.dataset.threadId=item.thread_id;main.className='ask-history-main';title.className='ask-history-title';title.href=threadUrl(item.thread_id);title.textContent=item.title;preview.className='ask-history-preview';preview.textContent=item.last_message_preview||tr('No messages yet.');meta.className='ask-history-meta';for(const value of metaText(item)){const span=document.createElement('span');span.textContent=value;meta.append(span);}main.append(title,preview,meta);actions.className='ask-history-actions';rename.addEventListener('click',()=>showRename(row,item,title,rename));remove.addEventListener('click',()=>deleteThread(item,remove));actions.append(rename,remove);row.append(main,actions);list.append(row);}}
  async function loadHistory(page){requestController?.abort();requestController=new AbortController();const abort=()=>requestController.abort();cleanupController.signal.addEventListener('abort',abort,{once:true});list.setAttribute('aria-busy','true');try{const response=await fetch(apiUrl(page),{signal:requestController.signal});if(!response.ok)throw new Error();renderHistory(await response.json());}catch(error){if(error.name!=='AbortError'){list.replaceChildren();const empty=document.createElement('div');empty.className='empty';empty.textContent=tr('Could not load Ask history');list.append(empty);}}finally{list.removeAttribute('aria-busy');cleanupController.signal.removeEventListener('abort',abort);}}
  document.querySelectorAll('[data-open-ask-history]').forEach(button=>button.addEventListener('click',()=>openHistory(button)));
  closeButton.addEventListener('click',()=>closeHistory());backdrop.addEventListener('click',event=>{if(event.target===backdrop)closeHistory();});
  searchForm.addEventListener('submit',event=>{event.preventDefault();loadHistory(1);});previous.addEventListener('click',()=>loadHistory(currentPage-1));next.addEventListener('click',()=>loadHistory(currentPage+1));
  document.addEventListener('keydown',event=>{if(backdrop.hidden)return;if(event.key==='Escape'){event.preventDefault();closeHistory();return;}if(event.key!=='Tab')return;const items=focusables();if(!items.length){event.preventDefault();return;}const first=items[0],last=items.at(-1);if(event.shiftKey&&document.activeElement===first){event.preventDefault();last.focus();}else if(!event.shiftKey&&document.activeElement===last){event.preventDefault();first.focus();}},{signal:cleanupController.signal});
  cleanupController.signal.addEventListener('abort',()=>closeHistory({restoreFocus:false}),{once:true});
})();
</script>

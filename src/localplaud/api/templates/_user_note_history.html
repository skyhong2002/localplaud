<div class="import-backdrop user-note-history-backdrop" id="user-note-history-backdrop" hidden>
  <section class="import-modal user-note-history-drawer" role="dialog" aria-modal="true" aria-labelledby="user-note-history-title">
    <div class="import-head"><span id="user-note-history-title">{{ t('Version history') }}</span><button class="import-close" id="user-note-history-close" type="button" aria-label="{{ t('Close') }}"><span class="nav-icon" style="--nav-icon:url('/static/lucide/x.svg')"></span></button></div>
    <div class="import-body user-note-history-body">
      <div class="user-note-history-current"><div class="user-note-history-current-title" id="user-note-history-current-title"></div><div class="sub" id="user-note-history-current-version"></div></div>
      <div class="user-note-history-list" id="user-note-history-list" role="list"></div>
      <div class="empty" id="user-note-history-empty" hidden>{{ t('No earlier versions yet.') }}</div>
    </div>
    <div class="user-note-history-footer"><span class="sub" id="user-note-history-status" role="status" aria-live="polite"></span><button class="btn sec" id="user-note-history-more" type="button" hidden>{{ t('Load older') }}</button></div>
  </section>
</div>
<script>
(()=>{
const tr=window.localplaudT,workspaceTimezone={{ workspace_preferences.timezone|tojson }},backdrop=document.getElementById('user-note-history-backdrop');if(!backdrop)return;
const cleanupController=new AbortController(),appView=document.getElementById('app-view'),list=document.getElementById('user-note-history-list'),empty=document.getElementById('user-note-history-empty'),status=document.getElementById('user-note-history-status'),more=document.getElementById('user-note-history-more'),closeButton=document.getElementById('user-note-history-close'),title=document.getElementById('user-note-history-current-title'),versionLabel=document.getElementById('user-note-history-current-version');
appView?.addEventListener('htmx:beforeCleanupElement',event=>{if(event.target===appView)cleanupController.abort();});
const background=[document.querySelector('.shell')||document.querySelector('.notes-page'),...document.querySelectorAll('.product-rail,.sidebar,.mobile-bar')];
const modal=window.localplaudModal({backdrop,background,cleanupSignal:cleanupController.signal});
let active=null,nextBefore=null,requestController=null,previewController=null,confirmation=null,restoreRecovery=null;
const dateLabel=value=>{if(!value)return tr('Date unavailable');try{return new Intl.DateTimeFormat(document.documentElement.lang||'en',{dateStyle:'medium',timeStyle:'short',timeZone:workspaceTimezone}).format(new Date(value));}catch(_error){return value;}};
const noteForm=id=>document.querySelector(`[data-workspace-note-form="${CSS.escape(String(id))}"]`)||document.querySelector(`#note-${CSS.escape(String(id))} [data-note-form]`);
const formDirty=form=>form&&!form.hidden&&(form.elements.title.value!==(form.dataset.originalTitle??form.elements.title.defaultValue)||form.elements.content_md.value!==(form.dataset.originalContent??form.elements.content_md.defaultValue));
const closeConfirmation=({restoreFocus=true}={})=>{if(!confirmation)return false;const {container,trigger}=confirmation;confirmation=null;container.remove();if(restoreFocus)trigger.focus();return true;};
const setBusy=value=>{modal.setBusy(value);closeButton.disabled=value;more.disabled=value;};
const clearRestoreRecovery=()=>{restoreRecovery?.remove();restoreRecovery=null;};
const showRestoreRecovery=()=>{clearRestoreRecovery();const button=document.createElement('button');button.className='btn sec';button.type='button';button.textContent=tr('Reload latest');button.addEventListener('click',()=>{location.href=active.returnUrl||location.href;});status.after(button);restoreRecovery=button;button.focus();};
async function previewVersion(item,row,button){const existing=row.querySelector('.user-note-history-preview');if(existing){existing.hidden=!existing.hidden;button.setAttribute('aria-expanded',String(!existing.hidden));return;}previewController?.abort();const controller=new AbortController();previewController=controller;const abort=()=>controller.abort();cleanupController.signal.addEventListener('abort',abort,{once:true});button.disabled=true;status.textContent=tr('Loading preview…');try{const response=await fetch(`/api/notes/${active.id}/history/${item.version}`,{signal:controller.signal}),data=await response.json();if(!response.ok)throw new Error(data.detail||tr('Could not load version'));if(controller!==previewController)return;const preview=document.createElement('div');preview.className='user-note-history-preview md';preview.innerHTML=data.content_html;row.append(preview);button.setAttribute('aria-expanded','true');status.textContent='';}catch(error){if(error.name!=='AbortError')status.textContent=error.message||tr('Could not load version');}finally{if(previewController===controller)previewController=null;button.disabled=false;cleanupController.signal.removeEventListener('abort',abort);}}
function confirmRestore(item,row,trigger){closeConfirmation({restoreFocus:false});clearRestoreRecovery();const container=document.createElement('div'),message=document.createElement('span'),cancel=document.createElement('button'),restore=document.createElement('button');container.className='user-note-history-confirm';message.textContent=tr('Restore this version? The current version will be preserved in history.');cancel.className='btn sec';cancel.type='button';cancel.textContent=tr('Cancel');restore.className='btn';restore.type='button';restore.textContent=tr('Restore');container.append(message,cancel,restore);row.append(container);confirmation={container,trigger,cancel,restore};cancel.addEventListener('click',()=>closeConfirmation());restore.addEventListener('click',async()=>{if(formDirty(noteForm(active.id))&&!confirm(tr('Discard unsaved changes and restore this version?')))return;cancel.disabled=true;restore.disabled=true;setBusy(true);status.textContent=tr('Restoring…');try{const response=await fetch(`/api/notes/${active.id}/history/${item.version}/restore`,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({base_version:active.version}),signal:cleanupController.signal}),data=await response.json();if(!response.ok){if(response.status===409&&data.detail?.code==='note_changed'){status.textContent=tr('This note changed elsewhere. Reload before restoring.');cancel.disabled=false;restore.disabled=false;setBusy(false);showRestoreRecovery();return;}throw new Error(typeof data.detail==='string'?data.detail:tr('Could not restore version'));}location.href=active.returnUrl||location.href;}catch(error){if(error.name!=='AbortError'){status.textContent=error.message||tr('Could not restore version');cancel.disabled=false;restore.disabled=false;setBusy(false);}}});cancel.focus();}
function renderItem(item){const row=document.createElement('div'),main=document.createElement('div'),itemTitle=document.createElement('div'),snippet=document.createElement('div'),meta=document.createElement('div'),actions=document.createElement('div'),preview=document.createElement('button'),restore=document.createElement('button');row.className='user-note-history-row';row.setAttribute('role','listitem');main.className='user-note-history-main';itemTitle.className='user-note-history-title';itemTitle.textContent=item.title;snippet.className='user-note-history-snippet';snippet.textContent=item.content_preview||tr('No preview available.');meta.className='user-note-history-meta';meta.textContent=`${tr('Version')} ${item.version} · ${dateLabel(item.archived_at)}`;main.append(itemTitle,snippet,meta);actions.className='user-note-history-actions';preview.className='icon-action icon-only';preview.type='button';preview.title=tr('Preview');preview.setAttribute('aria-label',`${tr('Preview')} ${tr('Version')} ${item.version}`);preview.setAttribute('aria-expanded','false');preview.innerHTML='<span class="nav-icon" style="--nav-icon:url(\'/static/lucide/eye.svg\')"></span>';restore.className='icon-action icon-only';restore.type='button';restore.title=tr('Restore');restore.setAttribute('aria-label',`${tr('Restore')} ${tr('Version')} ${item.version}`);restore.innerHTML='<span class="nav-icon" style="--nav-icon:url(\'/static/lucide/rotate-ccw.svg\')"></span>';actions.append(preview,restore);row.append(main,actions);preview.addEventListener('click',()=>previewVersion(item,row,preview));restore.addEventListener('click',()=>confirmRestore(item,row,restore));list.append(row);}
async function loadHistory({append=false}={}){requestController?.abort();previewController?.abort();previewController=null;const controller=new AbortController();requestController=controller;const abort=()=>controller.abort();cleanupController.signal.addEventListener('abort',abort,{once:true});more.disabled=true;status.textContent=tr('Loading history…');try{const url=new URL(`/api/notes/${active.id}/history`,location.origin);url.searchParams.set('limit','20');if(append&&nextBefore!==null)url.searchParams.set('before_version',String(nextBefore));const response=await fetch(url,{signal:controller.signal}),data=await response.json();if(!response.ok)throw new Error(data.detail||tr('Could not load history'));if(!append)list.replaceChildren();data.items.forEach(renderItem);nextBefore=data.next_before_version??null;empty.hidden=list.children.length!==0;more.hidden=nextBefore===null;status.textContent='';}catch(error){if(error.name!=='AbortError')status.textContent=error.message||tr('Could not load history');}finally{if(requestController===controller)requestController=null;more.disabled=false;cleanupController.signal.removeEventListener('abort',abort);}}
document.querySelectorAll('[data-user-note-history]').forEach(button=>button.addEventListener('click',()=>{const id=button.dataset.userNoteHistory,form=noteForm(id);if(formDirty(form)){if(!confirm(tr('Discard unsaved changes and open version history?')))return;form.querySelector('[data-note-cancel]')?.click();}active={id,version:Number(button.dataset.noteVersion),returnUrl:button.dataset.noteReturn};title.textContent=button.dataset.noteTitle;versionLabel.textContent=`${tr('Current version')} ${active.version}`;list.replaceChildren();empty.hidden=true;more.hidden=true;status.textContent='';clearRestoreRecovery();nextBefore=null;modal.open(button,closeButton);loadHistory();}));
closeButton.addEventListener('click',()=>modal.close());more.addEventListener('click',()=>loadHistory({append:true}));backdrop.addEventListener('localplaud:modal-close',()=>{requestController?.abort();requestController=null;previewController?.abort();previewController=null;closeConfirmation({restoreFocus:false});clearRestoreRecovery();active=null;list.replaceChildren();status.textContent='';});
document.addEventListener('keydown',event=>{if(event.key==='Escape'&&confirmation&&!backdrop.hidden&&backdrop.dataset.busy!=='true'){event.preventDefault();event.stopImmediatePropagation();closeConfirmation();}},{capture:true,signal:cleanupController.signal});
const restoredId=new URLSearchParams(location.search).get('history_restored');if(restoredId){requestAnimationFrame(()=>document.querySelector(`[data-user-note-history="${CSS.escape(restoredId)}"]`)?.focus());const url=new URL(location.href);url.searchParams.delete('history_restored');history.replaceState(history.state,'',url);}
})();
</script>

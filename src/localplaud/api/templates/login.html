<!doctype html>
<html lang="{{ workspace_preferences.locale }}" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ t('Sign in') }} · localplaud</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <style>
    :root{color-scheme:light;--blue:#007aff;--bg:#f2f4f7;--panel:#fff;--fg:#1f1f1f;--muted:#667085;--border:#d0d5dd;--danger:#b42318}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:var(--bg);color:var(--fg);font:14px/1.5 Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    main{width:min(400px,100%);padding:32px;background:var(--panel);border:1px solid var(--border);border-radius:8px;box-shadow:0 16px 48px rgba(16,24,40,.12)}
    .brand{font-size:22px;font-weight:750;letter-spacing:0}.brand span{color:var(--blue)}h1{margin:28px 0 6px;font-size:24px;letter-spacing:0}.sub{margin:0 0 24px;color:var(--muted)}
    label{display:block;margin-bottom:7px;font-weight:600}input{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:7px;background:var(--panel);color:var(--fg);font:inherit;outline:none}input:focus{border-color:var(--blue);box-shadow:0 0 0 3px color-mix(in srgb,var(--blue) 18%,transparent)}button{width:100%;margin-top:16px;padding:11px;border:0;border-radius:7px;background:var(--blue);color:#fff;font:inherit;font-weight:700;cursor:pointer}.error{margin:0 0 14px;color:var(--danger)}.foot{margin-top:20px;color:var(--muted);font-size:12px;text-align:center}
  </style>
</head>
<body>
  <main>
    <div class="brand">local<span>plaud</span></div>
    <h1>{{ t('Sign in') }}</h1>
    <p class="sub">{{ t('Sign in to your self-hosted localplaud workspace.') }}</p>
    {% if error %}<p class="error" role="alert">{{ t('Incorrect password. Try again.') }}</p>{% endif %}
    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next }}">
      <label for="password">{{ t('Password') }}</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required autofocus>
      <button type="submit">{{ t('Sign in') }}</button>
    </form>
    <div class="foot">{{ t('Plaud account connectivity is managed separately from this sign-in.') }}</div>
  </main>
</body>
</html>

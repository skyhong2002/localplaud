<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}localplaud{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    /* Design tokens matched to Plaud's shipped web app:
       iOS-blue primary, Plaud-red accents, Untitled-UI gray system, Inter, 8px radii. */
    :root {
      --blue:#007AFF; --blue-soft:#e9f2ff; --blue-br:#cfe4ff;
      --red:#F14349; --red-2:#FF503F; --red-soft:#fdecec;
      --purple:#8F53ED;
      --bg:#F2F4F7; --panel:#FFFFFF; --panel2:#F2F4F7;
      --border:#E4E7EC; --border2:#D0D5DD;
      --fg:#1F1F1F; --muted:#667085; --faint:#98A2B3;
      --ok:#16a34a; --warn:#d97706;
      --radius:8px; --radius-lg:12px;
      --shadow:0 1px 2px rgba(16,24,40,.05), 0 4px 16px rgba(16,24,40,.05);
      --sp0:#F14349; --sp1:#007AFF; --sp2:#16a34a; --sp3:#8F53ED;
      --sp4:#0891b2; --sp5:#db2777; --sp6:#ca8a04; --sp7:#ea580c;
      --sidebar-w:216px; --list-w:300px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --blue:#3b95ff; --blue-soft:#12233b; --blue-br:#1e3a5c;
        --red-soft:#3a1b1c;
        --bg:#161618; --panel:#1e1e21; --panel2:#26262a;
        --border:#2c2c31; --border2:#3a3a41; --fg:#ececee; --muted:#9a9aa2; --faint:#6e6e77;
        --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.25);
      }
    }
    :root[data-theme="dark"]{color-scheme:dark;} :root[data-theme="light"]{color-scheme:light;}
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--fg); display:flex; height:100vh; overflow:hidden;
      font:14px/1.55 Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; -webkit-font-smoothing:antialiased; }
    a { color:inherit; text-decoration:none; }
    ::selection { background:var(--blue-soft); }

    /* sidebar */
    .sidebar { width:var(--sidebar-w); flex:none; background:var(--bg); border-right:1px solid var(--border);
      display:flex; flex-direction:column; padding:14px 10px; gap:2px; }
    .brand { display:flex; align-items:center; gap:9px; padding:6px 8px 12px; }
    .brand svg { width:26px; height:26px; flex:none; border-radius:7px; box-shadow:0 2px 6px rgba(0,122,255,.28); }
    .wm { font-weight:700; font-size:15.5px; letter-spacing:-.02em; }
    .wm .a { color:var(--muted); } .wm .b { font-style:normal;
      background:linear-gradient(120deg,var(--blue),var(--purple)); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .navi { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:var(--radius); color:var(--fg); font-weight:500; }
    .navi .ic { width:18px; text-align:center; font-size:14px; }
    .navi:hover { background:var(--panel); }
    .navi.on { background:var(--panel); color:var(--blue); font-weight:600; box-shadow:var(--shadow); }
    .navi.red { color:var(--red); }
    .nav-h { font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--faint); padding:12px 10px 4px; }
    .sidebar .grow { flex:1; }
    .sidebar .foot { padding:8px 10px; font-size:11.5px; color:var(--faint); }

    /* two/three-pane recordings shell */
    .shell { flex:1; display:flex; min-width:0; }
    .filelist { width:var(--list-w); flex:none; border-right:1px solid var(--border); background:var(--bg);
      display:flex; flex-direction:column; overflow:hidden; }
    .filelist .fl-top { padding:14px 14px 10px; }
    .filelist .fl-title { font-weight:700; font-size:16px; letter-spacing:-.01em; }
    .filelist .fl-scroll { overflow-y:auto; padding:4px 10px 16px; display:flex; flex-direction:column; gap:6px; }
    .pane { flex:1; min-width:0; background:var(--panel); overflow-y:auto; }
    .pane-inner { max-width:760px; margin:0 auto; padding:26px 30px 80px; }

    /* single-column pages (search/status) */
    .content { flex:1; overflow-y:auto; }
    .content .pane-inner { max-width:820px; }

    /* file cards */
    .card { display:block; padding:11px 12px; background:var(--panel); border:1px solid var(--border);
      border-radius:var(--radius); transition:.1s; }
    .card:hover { border-color:var(--border2); }
    .card.on { border-color:var(--blue); background:var(--blue-soft); }
    .card .ct { font-weight:600; font-size:13.5px; letter-spacing:-.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card .cm { color:var(--muted); font-size:11.5px; margin-top:3px; display:flex; gap:7px; align-items:center; }
    .card .tags { margin-top:7px; display:flex; gap:5px; flex-wrap:wrap; }

    .chip { font-size:10.5px; font-weight:600; border-radius:5px; padding:1px 6px; border:1px solid var(--border2); color:var(--muted); }
    .chip.on { color:var(--blue); border-color:var(--blue-br); background:var(--blue-soft); }
    .st { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; padding:2px 7px; border-radius:999px; }
    .st.done{color:var(--ok);background:color-mix(in srgb,var(--ok) 12%,transparent);}
    .st.partial,.st.degraded{color:var(--warn);background:color-mix(in srgb,var(--warn) 12%,transparent);}
    .st.error{color:var(--red);background:var(--red-soft);}
    .st.failed{color:var(--red);background:var(--red-soft);}
    .st.processing,.st.downloading{color:var(--warn);background:color-mix(in srgb,var(--warn) 12%,transparent);}
    .st.downloaded,.st.discovered{color:var(--muted);background:var(--panel2);}

    /* headings, inputs, buttons */
    h1.page { font-size:22px; margin:0 0 3px; letter-spacing:-.02em; font-weight:700; }
    .sub { color:var(--muted); }
    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:16px 0 20px; }
    .tile { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:13px 14px; }
    .tile .k { font-size:11.5px; color:var(--muted); font-weight:600; } .tile .v { font-size:24px; font-weight:750; letter-spacing:-.02em; margin-top:2px; }
    .tile .v small { font-size:13px; color:var(--muted); font-weight:500; }
    .ask { display:flex; gap:8px; margin-bottom:14px; }
    .ask input, .search-input { flex:1; background:var(--panel); border:1px solid var(--border2); color:var(--fg);
      border-radius:10px; padding:11px 14px; font-size:14px; outline:none; }
    .ask input:focus, .search-input:focus { border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-soft); }
    .btn { background:var(--blue); color:#fff; border:0; border-radius:10px; padding:11px 17px; font-weight:600; cursor:pointer; font-size:13.5px; white-space:nowrap; }
    .btn:hover { filter:brightness(1.06); }
    .btn.sec { background:var(--panel); color:var(--fg); box-shadow:inset 0 0 0 1px var(--border2); }
    .btn.sec:hover { background:var(--panel2); }
    .fl-search { width:100%; background:var(--panel); border:1px solid var(--border2); color:var(--fg); border-radius:8px; padding:8px 11px; font-size:13px; outline:none; }
    .fl-search:focus { border-color:var(--blue); }

    .panel { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; }
    .empty { text-align:center; color:var(--muted); padding:64px 20px; }
    .empty .big { font-size:34px; margin-bottom:10px; }
    code { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; background:var(--panel2); padding:1px 6px; border-radius:5px; font-size:.88em; }

    /* detail */
    .backlink { color:var(--muted); font-size:13px; display:none; margin-bottom:10px; }
    .seg { display:flex; gap:11px; padding:8px 8px; border-radius:8px; cursor:pointer; }
    .seg:hover { background:var(--panel2); }
    .seg.active .txt { color:var(--red); }
    .seg .ts { color:var(--faint); font-size:11px; font-variant-numeric:tabular-nums; padding-top:2px; min-width:40px; text-align:right; }
    .seg .who { font-weight:650; font-size:12px; display:inline-flex; align-items:center; gap:5px; }
    .seg .who .dot { width:7px; height:7px; border-radius:50%; background:var(--c,var(--muted)); display:inline-block; }
    .seg .txt { flex:1; }
    .spk { --c:var(--muted); } .spk .who { color:var(--c); }
    .tabs { display:flex; gap:2px; margin:16px 0 14px; border-bottom:1px solid var(--border); }
    .tabs button { background:none; border:0; color:var(--muted); padding:9px 14px; cursor:pointer; font-weight:600; font-size:13.5px; border-bottom:2px solid transparent; margin-bottom:-1px; }
    .tabs button.on { color:var(--fg); border-bottom-color:var(--blue); }
    .md h1{font-size:17px;margin:.4em 0 .3em;font-weight:700;} .md h3,.md h4{font-size:14px;margin:.9em 0 .2em;font-weight:650;}
    audio { width:100%; margin:4px 0; }
    .legend { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:8px; }
    .legend .item { display:flex; align-items:center; gap:5px; font-size:11.5px; color:var(--muted); margin:0; }
    .legend .swatch { width:8px; height:8px; border-radius:50%; background:var(--muted); flex:none; }
    .legend .spk-name { background:var(--panel); border:1px solid var(--border2); color:var(--fg); border-radius:6px; padding:3px 7px; font-size:11.5px; width:110px; outline:none; }
    .legend .spk-name:focus { border-color:var(--blue); }
    .legend .spk-save { background:none; border:1px solid var(--border2); color:var(--muted); border-radius:6px; padding:3px 8px; font-size:11px; cursor:pointer; }
    .legend .spk-save:hover { color:var(--fg); background:var(--panel2); }
    .seg .editbtn { visibility:hidden; background:none; border:0; color:var(--muted); cursor:pointer; font-size:12px; padding:0 4px; }
    .seg:hover .editbtn { visibility:visible; }
    .seg .editbtn:hover { color:var(--fg); }
    .segedit { margin-top:6px; display:flex; flex-direction:column; gap:6px; cursor:default; }
    .segedit textarea { width:100%; background:var(--panel); border:1px solid var(--border2); color:var(--fg); border-radius:8px; padding:8px 10px; font-size:13px; font-family:inherit; resize:vertical; outline:none; }
    .segedit textarea:focus { border-color:var(--blue); }
    .segedit .actions { display:flex; gap:6px; }
    .segedit .actions button { padding:5px 12px; font-size:12px; }
    .htmx-indicator{opacity:0;transition:opacity .2s;} .htmx-request .htmx-indicator{opacity:1;}

    @media (max-width:820px){
      body { overflow:auto; height:auto; flex-direction:column; }
      .sidebar { width:auto; flex-direction:row; align-items:center; padding:8px 10px; gap:2px; border-right:0; border-bottom:1px solid var(--border); overflow-x:auto; position:sticky; top:0; z-index:20; }
      .sidebar .brand{ padding:4px 6px; } .sidebar .nav-h, .sidebar .grow, .sidebar .foot{ display:none; } .navi .lbl{ display:none; } .navi{ padding:8px 10px; } .navi .ic{ font-size:16px; }
      .shell { flex-direction:column; } .filelist{ width:auto; border-right:0; }
      .filelist.has-active { display:none; } .backlink{ display:inline-flex; }
      .stats{ grid-template-columns:repeat(2,1fr); } .pane-inner{ padding:20px 16px 60px; }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="localplaud">
        <defs><linearGradient id="bg" x1="6" y1="4" x2="42" y2="44" gradientUnits="userSpaceOnUse">
          <stop stop-color="#3D9BFF"/><stop offset=".55" stop-color="#007AFF"/><stop offset="1" stop-color="#8F53ED"/></linearGradient></defs>
        <rect width="48" height="48" rx="12" fill="url(#bg)"/>
        <rect x="18" y="9" width="12" height="19" rx="6" fill="#fff"/>
        <path d="M13.5 22.5a10.5 10.5 0 0 0 21 0" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
        <path d="M24 33v5M18.5 38.5h11" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <span class="wm lbl"><span class="a">local</span><span class="b">plaud</span></span>
    </div>
    <a class="navi {% if active=='recordings' %}on{% endif %}" href="/"><span class="ic">🎙️</span><span class="lbl">All files</span></a>
    <a class="navi {% if active=='search' %}on{% endif %}" href="/search"><span class="ic">🔍</span><span class="lbl">Ask &amp; Search</span></a>
    <div class="grow"></div>
    <a class="navi {% if active=='settings' %}on{% endif %}" href="/settings"><span class="ic">⚙️</span><span class="lbl">Settings</span></a>
    <a class="navi {% if active=='status' %}on{% endif %}" href="/status"><span class="ic">🩺</span><span class="lbl">Status</span></a>
    <div class="foot lbl">self-hosted</div>
  </aside>
  {% block body %}{% endblock %}
  <script>
    window.spkColor = (() => { const m={}, n=8; let i=0;
      return s => { if(!s) return null; if(!(s in m)) m[s]=i++%n; return m[s]; }; })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>

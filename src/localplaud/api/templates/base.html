<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}localplaud{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    :root {
      --bg: #0f1115; --panel: #171a21; --border: #262b36; --fg: #e6e8ec;
      --muted: #8b93a1; --accent: #6ea8fe; --ok: #4ade80; --warn: #fbbf24; --err: #f87171;
    }
    @media (prefers-color-scheme: light) {
      :root { --bg:#f7f8fa; --panel:#fff; --border:#e3e6eb; --fg:#1a1d23; --muted:#667085; --accent:#2563eb; }
    }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--fg); font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
    a { color:var(--accent); text-decoration:none; } a:hover { text-decoration:underline; }
    header { border-bottom:1px solid var(--border); padding:14px 22px; display:flex; align-items:center; gap:14px; position:sticky; top:0; background:var(--bg); z-index:5; }
    header h1 { font-size:16px; margin:0; letter-spacing:.02em; }
    header h1 a { color:var(--fg); }
    .badge { font-size:11px; color:var(--muted); border:1px solid var(--border); border-radius:999px; padding:1px 9px; }
    main { max-width:920px; margin:0 auto; padding:22px; }
    .ask { display:flex; gap:8px; margin-bottom:22px; }
    .ask input { flex:1; background:var(--panel); border:1px solid var(--border); color:var(--fg); border-radius:9px; padding:10px 13px; font-size:14px; }
    .ask button, .btn { background:var(--accent); color:#001; border:0; border-radius:9px; padding:10px 16px; font-weight:600; cursor:pointer; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:14px 16px; margin-bottom:10px; display:flex; justify-content:space-between; gap:12px; align-items:center; }
    .card .meta { color:var(--muted); font-size:12.5px; margin-top:3px; }
    .tags { display:flex; gap:6px; }
    .tag { font-size:11px; border-radius:6px; padding:1px 7px; border:1px solid var(--border); color:var(--muted); }
    .tag.on { color:var(--ok); border-color:color-mix(in srgb, var(--ok) 40%, transparent); }
    .status { font-size:11px; text-transform:uppercase; letter-spacing:.04em; }
    .status.done { color:var(--ok); } .status.error { color:var(--err); }
    .status.processing,.status.downloading { color:var(--warn); }
    .seg { padding:7px 0; border-bottom:1px solid var(--border); }
    .seg .who { color:var(--accent); font-weight:600; font-size:12.5px; }
    .seg .ts { color:var(--muted); font-size:11px; float:right; }
    .summary { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:6px 20px; margin-bottom:20px; }
    .answer { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:16px 18px; margin-bottom:22px; white-space:pre-wrap; }
    .src { color:var(--muted); font-size:12.5px; }
    .empty { color:var(--muted); text-align:center; padding:50px 0; }
    pre,code { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  </style>
</head>
<body>
  <header>
    <h1><a href="/">localplaud</a></h1>
    <span class="badge">self-hosted Plaud</span>
  </header>
  <main>{% block body %}{% endblock %}</main>
</body>
</html>

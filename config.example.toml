# localplaud configuration — copy to config.toml and edit.
#
# Secrets (Plaud cookie, API keys, HF token) are better kept OUT of this file.
# Any field can be overridden by an environment variable using the prefix
# LOCALPLAUD_ and "__" between levels, e.g.:
#     LOCALPLAUD_PLAUD__COOKIE="session=..."
#     LOCALPLAUD_ASR__OPENAI__API_KEY="sk-..."
# You can also put those in a .env file (see .env.example). config.toml and
# .env are git-ignored.

[plaud]
# Which Plaud cloud client to use:
#   "official" (default) — Plaud's sanctioned Open API with OAuth that
#       auto-refreshes. One-time setup: `localplaud auth login` (opens your
#       browser once, tokens land in ~/.plaud/tokens.json). Recommended.
#   "mcp"       — Plaud's official local MCP server. One-time setup:
#       `npx -y @plaud-ai/mcp@latest install`; uses ~/.plaud/tokens-mcp.json.
#   "apse1"    — DEPRECATED compatibility adapter for old deployments only.
#       Do not configure it for a new installation.
provider = "official"

# Legacy compatibility only: when the provider is "official" AND an old apse1
# browser session is configured, the poller may additionally read its listing to
# fill change-detection fields the Open API lacks (version / file_md5 /
# edit_time / is_trash). Purely optional.
apse1_enrichment = true

# ---- apse1 (DEPRECATED legacy enrichment) ---------------------------------- #
# API host for YOUR account/region. Find it in the browser devtools console:
#   localStorage.getItem("pld_plaud_user_api_domain")
# Do not assume the default below matches your region.
api_base = "https://api-apse1.plaud.ai"

# Session paste route: set the session via env vars (preferred, keeps it out
# of this file) — LOCALPLAUD_PLAUD__TOKEN / LOCALPLAUD_PLAUD__COOKIE.
# cookie = "paste-cookie-header-value-here"

  [plaud.official]
  # Defaults work for everyone; override only if Plaud changes its platform.
  # api_base = "https://platform.plaud.ai/developer/api"
  # tokens_path = "~/.plaud/tokens.json"

  [plaud.mcp]
  # command = "npx"
  # args = ["-y", "@plaud-ai/mcp@latest"]
  # tokens_path = "~/.plaud/tokens-mcp.json"
  # request_timeout_seconds = 30

[poller]
enabled = true
interval_seconds = 300           # how often to poll the Plaud cloud
auto_download = false            # metadata first; fetch audio only when requested
include_trash = false
download_dir = "./data/audio"    # where downloaded .opus files land
max_concurrent_downloads = 2

[store]
database_url = "sqlite:///./data/localplaud.db"

[pipeline]
# Local processing stages to run after each download.
convert = true                   # opus -> 16kHz mono wav (needs ffmpeg)
transcribe = true
diarize = true
summarize = true
mind_map = true                  # nested Markdown outline rendered as a tree in the Web App
index = true                     # build embeddings for Q&A / search
concurrency = 1                  # files processed in parallel by the worker
files_per_cycle = 1              # daemon batch; newest first so fresh files stay responsive
retry_max_attempts = 5           # consecutive failed cycles before manual Resume is required
retry_base_seconds = 300         # exponential delay: 5m, 10m, 20m, …
retry_max_seconds = 21600        # cap automatic retry delay at 6h
summary_chunk_chars = 12000      # full transcript is hierarchically summarized above this size
summary_template = "default"     # default | meeting | call | lecture | personal
# "independent" (default) accepts only raw audio + metadata from Plaud and
# requires a local transcript. "migration" permits explicitly imported Plaud
# Intelligence artifacts for comparison/backfill.
artifact_mode = "independent"
# Migration/debug only. The subscription-independent workflow keeps this false
# and derives every artifact from raw audio; imported Plaud rows remain separately
# labelled and are not reused. Effective only in migration mode.
prefer_cloud_artifacts = false

# --------------------------------------------------------------------------- #
# ASR — speech recognition. Local turbo is the subscription-independent baseline;
# cloud providers are explicit operator choices, never a silent paid fallback.
# --------------------------------------------------------------------------- #
[asr]
provider = "faster-whisper"      # faster-whisper | whispercpp | mlx-whisper | openai | deepgram | assemblyai
language = "auto"                # ISO code (e.g. "en", "zh") or "auto"
fallback = []                    # opt in explicitly; avoid surprise paid processing

  [asr.vad]                      # Voice Activity Detection — first stage of the speech pipeline
  # Off by default until benchmarked on real Taiwan Mandarin / code-switch audio.
  # Enabling the local (mlx-whisper) path needs the optional 'vad' extra:
  #   pip install 'localplaud[vad]'   (silero-vad). faster-whisper's native VAD
  # filter bundles its own silero and needs no extra. If enabled but the package
  # is missing, ASR logs a warning and falls back to whole-file transcription.
  enabled = false
  threshold = 0.5                # silero speech-probability cutoff (0-1)
  min_speech_ms = 250            # drop speech blips shorter than this
  min_silence_ms = 100           # silence needed to close a speech region
  speech_pad_ms = 30             # padding silero adds around each region
  merge_gap_s = 0.5              # merge regions separated by a shorter gap (mlx path)
  region_pad_s = 0.2             # extra padding per ASR chunk so words aren't clipped
  max_region_s = 30.0            # split longer regions to bound each ASR call

  [asr.faster_whisper]           # local, CPU or NVIDIA CUDA (CTranslate2)
  model = "large-v3-turbo"
  device = "auto"                # auto | cpu | cuda
  compute_type = "auto"          # auto | int8 | int8_float16 | float16 | float32

  [asr.whispercpp]               # local, uses Metal on Apple Silicon
  binary = "whisper-cli"
  model_path = "./models/ggml-large-v3-turbo.bin"

  [asr.mlx_whisper]              # local, Apple Silicon (MLX / Metal)
  model = "mlx-community/whisper-large-v3-turbo"

  [asr.openai]                   # cloud
  # api_key via LOCALPLAUD_ASR__OPENAI__API_KEY
  model = "whisper-1"

  [asr.deepgram]                 # cloud, does speaker diarization server-side
  # api_key via LOCALPLAUD_ASR__DEEPGRAM__API_KEY
  model = "nova-2"
  diarize = true

  [asr.assemblyai]               # cloud, speaker labels server-side
  # api_key via LOCALPLAUD_ASR__ASSEMBLYAI__API_KEY
  speaker_labels = true

# --------------------------------------------------------------------------- #
# Diarization — only used when the ASR provider didn't already return speakers.
# Cloud ASR (deepgram/assemblyai) return speakers directly, so this is skipped.
# --------------------------------------------------------------------------- #
[diarize]
provider = "pyannote"            # required for the default Plaud-like speaker workflow
model = "pyannote/speaker-diarization-community-1"
# hf_token via LOCALPLAUD_DIARIZE__HF_TOKEN (needed to download pyannote models)
# num_speakers = 2               # optional hint; omit to auto-detect

# --------------------------------------------------------------------------- #
# LLM — used for summaries / structured notes and Q&A answers.
# --------------------------------------------------------------------------- #
[llm]
provider = "ollama"              # ollama | openai | anthropic

  [llm.ollama]                   # local, no API key
  host = "http://localhost:11434"
  model = "llama3.1:8b"

  [llm.openai]
  # api_key via LOCALPLAUD_LLM__OPENAI__API_KEY
  model = "gpt-4o-mini"

  [llm.anthropic]
  # api_key via LOCALPLAUD_LLM__ANTHROPIC__API_KEY
  model = "claude-haiku-4-5"

# --------------------------------------------------------------------------- #
# Embeddings — for Q&A ("Ask Plaud" equivalent) and semantic search.
# --------------------------------------------------------------------------- #
[embeddings]
provider = "local"               # local (sentence-transformers) | ollama | openai

  [embeddings.local]
  model = "sentence-transformers/all-MiniLM-L6-v2"

  [embeddings.ollama]            # local, no torch — just a running Ollama daemon
  host = "http://localhost:11434"
  model = "bge-m3"

  [embeddings.openai]
  # api_key via LOCALPLAUD_EMBEDDINGS__OPENAI__API_KEY
  model = "text-embedding-3-small"

[api]
# Loopback by default so a stray `localplaud run` isn't LAN-exposed. Docker
# overrides this to 0.0.0.0 (it sits behind Caddy).
host = "127.0.0.1"
port = 8080
# Optional shared secret: when set, every request needs it as an X-Auth-Token
# header or ?token= param. Prefer real auth (Caddy basic_auth) in front.
# auth_token via LOCALPLAUD_API__AUTH_TOKEN
# public_url = "https://plaud.observe.tw"   # set to your domain behind the reverse proxy
